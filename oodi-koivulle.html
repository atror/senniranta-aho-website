<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oodi Koivulle — Senni Ranta-aho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --black: #111110; --white: #f5f3ee; --warm: #e8e5de;
  --mid: #8c8a84; --light: #d0cdc6; --olive: #4a5740;
  --font: 'Barlow', system-ui, sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--white); color: var(--black); font-family: var(--font); font-weight: 300; font-size: 15px; line-height: 1.7; overflow-x: hidden; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 26px 52px; background: var(--white); border-bottom: 1px solid var(--light); }
.nav-brand { display: flex; flex-direction: column; gap: 3px; text-decoration: none; }
.nav-name { font-weight: 300; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--black); text-decoration: none; }
.nav-sub { font-size: 9px; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); }
.nav-links { display: flex; gap: 40px; list-style: none; align-items: center; }
.nav-links a { font-size: 11px; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; color: var(--mid); transition: color 0.25s; }
.nav-links a:hover { color: var(--olive); }
.nav-links a.active { color: var(--black); border-bottom: 1px solid var(--black); padding-bottom: 2px; }
.nav-divider { width: 1px; height: 12px; background: var(--light); }
.detail-hero { display: none; }
.detail-hero img { width: 100%; height: auto; display: block; }
.detail-body { padding: 140px 52px 80px; }
.back-link { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; color: var(--mid); margin-bottom: 48px; transition: color 0.2s; }
.back-link:hover { color: var(--olive); }
.detail-title { font-weight: 200; font-style: italic; font-size: clamp(40px, 5vw, 68px); line-height: 1.06; margin-bottom: 16px; }
.detail-meta { display: flex; gap: 40px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); padding-bottom: 36px; border-bottom: 1px solid var(--light); margin-bottom: 52px; }
.detail-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; }
.detail-gallery img { width: 100%; height: auto; display: block; }
footer { padding: 32px 52px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--light); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); }
.footer-name { font-size: 11px; letter-spacing: 0.18em; color: var(--black); }
.footer-contact a { color: var(--mid); text-decoration: none; transition: color 0.2s; }
.footer-contact a:hover { color: var(--olive); }
@media (max-width: 880px) { nav { padding: 18px 24px; } .detail-body { padding: 36px 24px 60px; } .detail-gallery { grid-template-columns: 1fr; } footer { flex-direction: column; gap: 10px; text-align: center; padding: 28px 24px; } }

/* ── MOBILE NAV ── */
.nav-toggle {
  display: none;
  flex-direction: column; justify-content: center; gap: 5px;
  width: 32px; height: 32px;
  background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0;
}
.nav-toggle span { display: block; width: 22px; height: 1px; background: var(--black); transition: transform 0.3s ease, opacity 0.3s ease; }
.nav-open .nav-toggle span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
.nav-open .nav-toggle span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
@media (max-width: 680px) {
  .nav-toggle { display: flex; }
  nav { position: fixed; flex-wrap: wrap; }
  .nav-links {
    display: none; flex-direction: column; gap: 0; align-items: flex-start;
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--white); border-bottom: 1px solid var(--light);
    padding: 6px 0; z-index: 99; list-style: none;
  }
  .nav-open .nav-links { display: flex; }
  .nav-links li { width: 100%; }
  .nav-links a { display: block; padding: 13px 24px; font-size: 12px; letter-spacing: 0.16em; }
  .nav-divider { display: none !important; }
}
</style>
</head>
<body>
<nav id="nav">
  <a href="index.html" class="nav-brand">
    <span class="nav-name">Senni Ranta-aho</span>
    <span class="nav-sub">Furniture &amp; Space Design</span>
  </a>
  <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>

  <ul class="nav-links">
    <li><a href="furniture.html" class="active">Furniture</a></li>
    <li><a href="architectural.html">Architectural Design</a></li>
    <li class="nav-divider"></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<div class="detail-body">
  <a href="furniture.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 7H2M6 3L2 7l4 4"/></svg>
    Back to work
  </a>
  <p class="detail-subtitle" style="font-size:13px;color:var(--mid);letter-spacing:0.1em;margin-bottom:8px;">Ode to Birch</p>
  <h1 class="detail-title">Oodi Koivulle</h1>
  <div class="detail-meta">
    <span>Birch Bark "tuohi" & Heat Treated Birch</span>
    <span>2026</span>
    <span>Furniture</span>
  </div>
  <div class="detail-gallery">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/kuura.jpg" alt="Oodi Koivulle">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/oodi-2.jpg" alt="Oodi Koivulle">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/oodi-3.jpg" alt="Oodi Koivulle">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/oodi-4.jpg" alt="Oodi Koivulle">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/oodi-5.jpg" alt="Oodi Koivulle">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/oodi-6.jpg" alt="Oodi Koivulle">
    <img loading="lazy" src="Kuvat/Oodi Koivulle/oodi-7.jpg" alt="Oodi Koivulle">
  </div>
</div>
<footer>
  <span class="footer-name">Senni Ranta-aho</span>
  <span>© 2026. All rights reserved.</span>
</footer>
<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 40); });
  document.querySelectorAll('.email-link').forEach(function(a){
    a.addEventListener('click',function(e){e.preventDefault();window.location='mailto:'+a.dataset.u+'@'+a.dataset.d;});
  });

  const navToggle = document.querySelector('.nav-toggle');
  if (navToggle) {
    navToggle.addEventListener('click', function() {
      document.getElementById('nav').classList.toggle('nav-open');
    });
    // close on outside click
    document.addEventListener('click', function(e) {
      if (!e.target.closest('#nav')) document.getElementById('nav').classList.remove('nav-open');
    });
  }
</script>
</body>
</html>
